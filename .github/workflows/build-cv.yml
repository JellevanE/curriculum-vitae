name: Build CV

on:
  push:
    branches: [main]
    paths:
      - 'cv_markdown.md'
      - 'style.css'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc and WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc weasyprint

      - name: Create output directory
        run: mkdir -p output

      - name: Build HTML
        run: |
          pandoc cv_markdown.md \
            --from markdown \
            --to html5 \
            --standalone \
            --embed-resources \
            --css style.css \
            --metadata pagetitle="Jelle van Elburg — CV" \
            --output output/cv.html

      - name: Build PDF (via WeasyPrint)
        run: weasyprint output/cv.html output/cv.pdf --stylesheet style.css

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-output
          path: output/
          retention-days: 30

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
