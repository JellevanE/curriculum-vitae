name: Build CV

on:
  push:
    branches: [main]
    paths:
      - 'cv_markdown.md'
      - 'style.css'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc and WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc weasyprint

      - name: Create output directory
        run: mkdir -p output

      - name: Build HTML
        run: |
          pandoc cv_markdown.md \
            --from markdown \
            --to html5 \
            --standalone \
            --embed-resources \
            --css style.css \
            --metadata pagetitle="Jelle van Elburg — CV" \
            --output output/cv.html

      - name: Build PDF (via WeasyPrint)
        run: weasyprint output/cv.html output/cv.pdf --stylesheet style.css

      - name: Add index.html for Pages root
        run: cp output/cv.html output/index.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-output
          path: output/
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
